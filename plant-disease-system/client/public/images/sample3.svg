<svg xmlns="http://www.w3.org/2000/svg" width="800" height="480" viewBox="0 0 800 480">
  <defs>
    <linearGradient id="leafGrad3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#66BB6A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B5E20;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100%" height="100%" fill="#faf9f6"/>
  <!-- Stem -->
  <line x1="400" y1="420" x2="400" y2="60" stroke="#5D4037" stroke-width="10"/>
  <!-- Top leaf (fungal) -->
  <ellipse cx="300" cy="120" rx="100" ry="130" fill="url(#leafGrad3)" transform="rotate(-45 300 120)"/>
  <!-- White fungal spots on top leaf -->
  <circle cx="280" cy="90" r="13" fill="#FFFFFF" opacity="0.75"/>
  <circle cx="310" cy="110" r="10" fill="#FFFDE7" opacity="0.7"/>
  <circle cx="290" cy="150" r="11" fill="#FFFFFF" opacity="0.7"/>
  <circle cx="330" cy="140" r="8" fill="#FFFDE7" opacity="0.6"/>
  <!-- Middle leaf (healthy) -->
  <ellipse cx="500" cy="240" rx="105" ry="135" fill="#81C784" transform="rotate(40 500 240)"/>
  <!-- Bottom leaf (yellowing) -->
  <ellipse cx="380" cy="350" rx="95" ry="115" fill="#FDD835" transform="rotate(-20 380 350)"/>
  <circle cx="360" cy="330" r="6" fill="#F57F17" opacity="0.6"/>
  <circle cx="400" cy="370" r="7" fill="#F57F17" opacity="0.5"/>
</svg>